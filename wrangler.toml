name = "viroshort"
compatibility_date = "2024-01-15"
pages_build_output_dir = "dist"

[env.production]
name = "viroshort"

[env.preview]
name = "viroshort-preview"

[[env.production.bindings]]
name = "DB"
type = "d1"

[[env.preview.bindings]]
name = "DB" 
type = "d1"

# Node.js compatibility for your dependencies
compatibility_flags = ["nodejs_compat"]

# Environment variables (these will be set in Cloudflare dashboard)
[vars]
NODE_ENV = "production" 